name: Merge draft to Main

on:
  # Manual only — scheduled daily merge disabled to save Actions runs; trigger from Actions tab when needed.
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge draft to main
        run: |
          git checkout main
          git merge origin/draft --no-edit
          git push origin main
