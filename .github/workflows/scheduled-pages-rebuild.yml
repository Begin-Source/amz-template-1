# Re-runs Next.js static export so `filterByPublishDate` picks up newly valid posts (UTC `date`).
# Requires Cloudflare Pages → Git integration on branch `main` (or change `ref` below).
# Cron is UTC. Example: "30 0 * * *" = 00:30 UTC daily ≈ 08:30 Beijing (non-DST).

name: Scheduled Pages rebuild

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduled-pages-rebuild
  cancel-in-progress: false

jobs:
  empty-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Empty commit (triggers Cloudflare Pages build)
        run: |
          git commit --allow-empty -m "chore: scheduled rebuild for publish dates"
          git push origin HEAD:main
