# Re-sync site repo with BeginOS template (amz-template-1).
# Trigger: workflow_dispatch only (e.g. from n8n via GitHub Actions API). No schedule.
# Preserves per-site Markdown under content/ and lib/site.config.ts (re-run Push Design if needed).

name: Sync from upstream template

on:
  workflow_dispatch:

permissions:
  contents: write
  # Required when rsync updates files under .github/workflows/ (GITHUB_TOKEN cannot push workflow changes without this).
  workflows: write

concurrency:
  group: sync-from-upstream-template
  cancel-in-progress: true

env:
  TEMPLATE_REPO: Begin-Source/amz-template-1

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # actions/checkout `path` must stay under $GITHUB_WORKSPACE`; ../ is rejected.
      # Clone to /tmp so rsync --delete never removes the live source tree (exit 24 / vanished).
      - name: Clone upstream template
        run: |
          rm -rf /tmp/amz-template-upstream
          git clone --depth 1 --branch main \
            "https://x-access-token:${TOKEN}@github.com/${{ env.TEMPLATE_REPO }}.git" \
            /tmp/amz-template-upstream
        env:
          TOKEN: ${{ secrets.TEMPLATE_UPSTREAM_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync template into repository
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='out' \
            --exclude='build' \
            --exclude='.turbo' \
            --exclude='lib/site.config.ts' \
            --exclude='content' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production' \
            --exclude='.env.development' \
            /tmp/amz-template-upstream/ ./
          rm -rf /tmp/amz-template-upstream

      - name: Commit and push if changed
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes after sync."
            exit 0
          fi
          git commit -m "chore: sync from upstream template (${{ env.TEMPLATE_REPO }})"
          git push origin main
